<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📚 Politique économique - Exercices</title>
    <style>
        :root {
            --primary: #cc785c;
            --primary-light: #e8a88c;
            --primary-dark: #a85d45;
            --bg: #f5f5f0;
            --bg-card: #ffffff;
            --text: #2d2d2d;
            --text-light: #666666;
            --border: #e0ddd5;
            --success: #22c55e;
            --success-bg: #dcfce7;
            --error: #ef4444;
            --error-bg: #fee2e2;
            --info: #3b82f6;
            --info-bg: #dbeafe;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 2px solid var(--primary);
            margin-bottom: 30px;
        }

        header h1 {
            color: var(--primary-dark);
            font-size: 2rem;
            margin-bottom: 10px;
        }

        header p {
            color: var(--text-light);
            font-size: 1.1rem;
        }

        /* Menu principal */
        #menu {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            margin-bottom: 20px;
        }

        .menu-section {
            margin-bottom: 25px;
        }

        .menu-section:last-child {
            margin-bottom: 0;
        }

        .menu-section h3 {
            color: var(--primary-dark);
            margin-bottom: 15px;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .chapters-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 10px;
        }

        .chapter-checkbox {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 12px;
            background: var(--bg);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
        }

        .chapter-checkbox:hover {
            border-color: var(--primary-light);
        }

        .chapter-checkbox.selected {
            background: var(--primary-light);
            border-color: var(--primary);
        }

        .chapter-checkbox.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .chapter-checkbox input {
            accent-color: var(--primary);
            width: 18px;
            height: 18px;
        }

        .chapter-checkbox span {
            font-size: 0.95rem;
        }

        .mode-buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .mode-btn {
            flex: 1;
            min-width: 150px;
            padding: 15px 20px;
            border: 2px solid var(--border);
            border-radius: 10px;
            background: var(--bg-card);
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }

        .mode-btn:hover:not(:disabled) {
            border-color: var(--primary);
            background: var(--bg);
        }

        .mode-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .mode-btn .icon {
            font-size: 1.5rem;
            margin-bottom: 8px;
        }

        .mode-btn .title {
            font-weight: 600;
            color: var(--text);
        }

        .mode-btn .desc {
            font-size: 0.85rem;
            color: var(--text-light);
            margin-top: 5px;
        }

        /* Zone de quiz */
        #quiz {
            display: none;
        }

        .quiz-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 15px;
            background: var(--bg-card);
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .quiz-info {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .quiz-info span {
            font-size: 0.95rem;
            color: var(--text-light);
        }

        .quiz-info .score {
            font-weight: 600;
            color: var(--primary-dark);
        }

        .btn-back {
            padding: 8px 16px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .btn-back:hover {
            background: var(--border);
        }

        /* Carte de question */
        .question-card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            margin-bottom: 20px;
        }

        .question-meta {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .badge-chapter {
            background: var(--info-bg);
            color: var(--info);
        }

        .badge-type {
            background: var(--bg);
            color: var(--text-light);
        }

        .question-text {
            font-size: 1.15rem;
            margin-bottom: 25px;
            line-height: 1.7;
        }

        .answers {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .answer-btn {
            padding: 15px 20px;
            border: 2px solid var(--border);
            border-radius: 10px;
            background: var(--bg-card);
            cursor: pointer;
            text-align: left;
            font-size: 1rem;
            transition: all 0.2s;
        }

        .answer-btn:hover:not(:disabled) {
            border-color: var(--primary);
            background: var(--bg);
        }

        .answer-btn:disabled {
            cursor: default;
            opacity: 1 !important;
            color: var(--text) !important;
            border-color: var(--border);
        }

        .answer-btn.correct {
            border-color: var(--success) !important;
            background: var(--success-bg) !important;
            color: var(--text) !important;
        }

        .answer-btn.incorrect {
            border-color: var(--error) !important;
            background: var(--error-bg) !important;
            color: var(--text) !important;
        }

        .answer-btn.selected {
            border-color: var(--primary);
            background: var(--bg);
            font-weight: 600;
        }

        /* Explication */
        .explanation {
            margin-top: 20px;
            padding: 20px;
            background: var(--bg);
            border-radius: 10px;
            border-left: 4px solid var(--primary);
            display: none;
        }

        .explanation.show {
            display: block;
        }

        .explanation h4 {
            color: var(--primary-dark);
            margin-bottom: 10px;
        }

        .explanation p {
            color: var(--text);
            line-height: 1.7;
        }

        /* Bouton suivant */
        .btn-next {
            display: none;
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 20px;
        }

        .btn-next:hover {
            background: var(--primary-dark);
        }

        .btn-next.show {
            display: block;
        }

        .btn-next {
            white-space: nowrap;
        }

        /* Exercice chiffre */
        .exercise-input {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-top: 20px;
        }

        .exercise-input input {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .exercise-input input:focus {
            border-color: var(--primary);
        }

        .exercise-input input:disabled {
            color: var(--text) !important;
            opacity: 1 !important;
            -webkit-text-fill-color: var(--text) !important;
        }

        .exercise-input .unit {
            color: var(--text-light);
            font-size: 0.95rem;
        }

        .btn-validate {
            padding: 12px 25px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-validate:hover {
            background: var(--primary-dark);
        }

        /* Simulation */
        .simulation-container {
            margin-top: 20px;
        }

        .simulation-controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .control-group {
            background: var(--bg);
            padding: 15px;
            border-radius: 10px;
        }

        .control-group label {
            display: block;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--text);
        }

        .control-group input[type="range"] {
            width: 100%;
            accent-color: var(--primary);
        }

        .control-group .value {
            text-align: center;
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--primary-dark);
            margin-top: 5px;
        }

        .simulation-result {
            background: var(--primary-light);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .simulation-result .label {
            font-size: 0.95rem;
            color: var(--primary-dark);
            margin-bottom: 5px;
        }

        .simulation-result .value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary-dark);
        }

        .simulation-explanation {
            margin-top: 20px;
            padding: 15px;
            background: var(--bg);
            border-radius: 8px;
            font-size: 0.95rem;
            color: var(--text-light);
        }

        .graph-container {
            background: white;
            border-radius: 10px;
            padding: 15px;
            margin: 20px 0;
            border: 1px solid var(--border);
        }

        .graph-container canvas {
            width: 100%;
            height: auto;
        }

        .deind-controls {
            grid-template-columns: repeat(3, minmax(200px, 1fr));
        }

        .deind-controls .control-group {
            min-height: 130px;
            display: flex;
            flex-direction: column;
        }

        .deind-controls .control-group label {
            min-height: 72px;
            display: flex;
            align-items: flex-start;
        }

        .deind-controls .control-group input[type="range"] {
            margin-top: auto;
        }

        .deind-graph canvas {
            display: block;
            width: 100%;
            height: clamp(320px, 52vw, 460px);
        }

        .simulation-results-row {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }

        .simulation-result-item {
            flex: 1;
            min-width: 150px;
            background: var(--bg);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .simulation-result-item .label {
            font-size: 0.85rem;
            color: var(--text-light);
            margin-bottom: 5px;
        }

        .simulation-result-item .value {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--primary-dark);
        }

        .deind-results .simulation-result-item {
            min-height: 96px;
            justify-content: space-between;
        }

        .deind-results .simulation-result-item .label {
            min-height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Résultats finaux */
        .results-card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .results-card h2 {
            color: var(--primary-dark);
            margin-bottom: 20px;
        }

        .results-score {
            font-size: 3rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 10px;
        }

        .results-details {
            color: var(--text-light);
            margin-bottom: 30px;
        }

        .btn-restart {
            padding: 15px 40px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-restart:hover {
            background: var(--primary-dark);
        }

        /* Progress bar */
        .progress-bar {
            width: 100%;
            height: 6px;
            background: var(--border);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .progress-fill {
            height: 100%;
            background: var(--primary);
            transition: width 0.3s;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .container {
                padding: 15px;
            }

            header h1 {
                font-size: 1.5rem;
            }

            .question-card {
                padding: 20px;
            }

            .quiz-header {
                flex-direction: column;
                gap: 15px;
            }

            .mode-buttons {
                flex-direction: column;
            }

            .exercise-input {
                flex-wrap: wrap;
            }

            .exercise-input .btn-validate {
                width: 100%;
                margin-top: 10px;
            }

            .deind-controls {
                grid-template-columns: 1fr;
            }

            .deind-graph canvas {
                height: 320px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 Politique économique</h1>
            <p>Exercices de révision - Sciences Po</p>
        </header>

        <!-- Menu principal -->
        <div id="menu">
            <div class="menu-section">
                <h3>Sélectionner les thèmes</h3>
                <div class="chapters-grid" id="chapters-list">
                    <!-- Généré par JS -->
                </div>
            </div>

            <div class="menu-section">
                <h3>Choisir un mode</h3>
                <div class="mode-buttons">
                    <button class="mode-btn" id="btn-qcm" disabled>
                        <div class="icon">✓✗</div>
                        <div class="title">QCM</div>
                        <div class="desc">Testez vos connaissances</div>
                    </button>
                    <button class="mode-btn" id="btn-exercice" disabled>
                        <div class="icon">∑</div>
                        <div class="title">Exercices</div>
                        <div class="desc">Calculs et applications</div>
                    </button>
                    <button class="mode-btn" id="btn-simulation" disabled>
                        <div class="icon">📈</div>
                        <div class="title">Simulations</div>
                        <div class="desc">Visualisez les mécanismes</div>
                    </button>
                </div>
            </div>
        </div>

        <!-- Zone de quiz -->
        <div id="quiz">
            <div class="quiz-header">
                <button class="btn-back" onclick="backToMenu()">Retour au menu</button>
                <div class="quiz-info">
                    <span>Question <span id="current-q">1</span>/<span id="total-q">10</span></span>
                    <span class="score">Score: <span id="score">0</span></span>
                </div>
            </div>

            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>

            <div id="question-container">
                <!-- Genere par JS -->
            </div>
        </div>
    </div>

    <script>
        // ===========================================

        const chapters = [
            { id: 1, name: "La politique budgétaire", available: true },

            { id: 3, name: "La croissance", available: true },

        const qcmQuestions = [

                question: "La valeur ajoutée créée par une multinationale française à l'étranger est comptabilisée dans le PIB de la France.",
                answers: ["Vrai", "Faux"],
                correct: 1,
                explanation: "Le PIB mesure la production réalisée sur le territoire national, quelle que soit la nationalité des producteurs. La valeur ajoutée créée à l'étranger par une entreprise française est comptabilisée dans le PIB du pays où elle est produite, pas dans le PIB français. C'est le PNB (Produit National Brut) qui prend en compte la nationalité des facteurs de production."
            },
            {

                question: "Un écart de production (output gap) négatif signifie que l'économie est en surchauffe.",
                answers: ["Vrai", "Faux"],
                correct: 1,
                explanation: "Un écart de production négatif signifie que le PIB effectif est inférieur au PIB potentiel : l'économie sous-utilise ses capacités productives (travail, capital). C'est une situation de sous-emploi des facteurs de production, pas de surchauffe. La surchauffe correspond à un écart de production positif."
            },
            {
                chapter: 3,
                type: "chiffre",
                question: "Quel est l'ordre de grandeur du taux de croissance potentielle de la France ?",
                answers: ["Environ 0,5 %", "Environ 1,2 %", "Environ 2,5 %", "Environ 3,5 %"],

                explanation: "Le taux de croissance potentielle de la France est estimé autour de 1,2 % par an selon les estimations de la Commission européenne et du FMI. Ce taux a significativement baissé depuis les Trente Glorieuses (où il dépassait 5 %)."
            },
            {
                chapter: 3,

                answers: ["Vrai", "Faux"],
                correct: 0,
                explanation: "La PGF, aussi appelée « résidu de Solow », correspond à la croissance qui n'est pas attribuable à l'augmentation des quantités de travail et de capital. Elle reflète principalement le progrès technique, mais aussi l'amélioration de l'organisation de la production, l'éducation, la qualité des institutions, etc."
            },
            {
                chapter: 3,
                type: "definition",
                question: "Le taux de croissance du PIB en volume mesure l'évolution de la valeur ajoutée corrigée de l'inflation.",
                answers: ["Vrai", "Faux"],
                correct: 0,
                explanation: "Le PIB en volume (ou PIB réel) est calculé à prix constants (ceux d'une année de référence). Cela permet de neutraliser l'effet des variations de prix. C'est l'indicateur pertinent pour mesurer l'évolution de la production et du niveau de vie, contrairement au PIB en valeur (ou nominal) qui mélange effet volume et effet prix."
            },
            {
                chapter: 3,
                type: "chiffre",
                question: "Quel est l'ordre de grandeur de l'écart de PIB par habitant entre la France et les États-Unis ?",

            },
            {
                chapter: 3,
                type: "chiffre",
                question: "Quel est l'ordre de grandeur du PIB de la France en 2024 ?",
                answers: ["Environ 2 000 milliards d'euros", "Environ 2 500 milliards d'euros", "Environ 2 900 milliards d'euros", "Environ 3 400 milliards d'euros"],
                correct: 2,
                explanation: "Le PIB de la France en 2024 est d'environ 2 900 milliards d'euros. À titre d'ordre de grandeur, 1 point de PIB représente donc environ 30 milliards d'euros."
            },
            {
                chapter: 3,
                type: "definition",
                question: "Comment appelle-t-on le phénomène par lequel un choc négatif (comme une récession) peut réduire durablement le PIB potentiel (par exemple via la perte de compétences des chômeurs de longue durée ou le sous-investissement) ?",
                answers: ["L'effet multiplicateur", "L'effet d'hystérèse", "L'effet d'éviction", "L'effet de rattrapage"],
                correct: 1,
                explanation: "L'effet d'hystérèse désigne le phénomène par lequel un choc négatif (comme une récession) a des effets permanents sur l'économie. Quand le PIB reste durablement éloigné de son niveau potentiel, cela peut entraîner une perte de compétences des chômeurs, une dépréciation du capital humain et un sous-investissement, réduisant à terme le PIB potentiel lui-même. C'est pour cette raison que l'on cherche à résorber au plus vite l'écart de production."
            },
            {
                chapter: 3,
                type: "concept",
                question: "Le PIB potentiel peut être mesuré directement.",
                answers: ["Vrai", "Faux"],
                correct: 1,
                explanation: "Le PIB potentiel, la croissance potentielle et l'écart de production ne sont pas directement observables. Ils doivent être estimés à l'aide de modèles économiques. Selon les méthodologies utilisées (FMI, Commission européenne, OCDE...), les estimations peuvent différer significativement et faire l'objet de révisions importantes. Cette incertitude complique la conduite de la politique économique, car les décideurs ne savent pas précisément où se situe l'économie par rapport à son potentiel."
            },
            {

                question: "Quelle est la part de l'investissement dans le PIB de la France en 2024 ?",

                explanation: `L'investissement représente environ 22 % du PIB français.<br><br>

                selectedChapters.push(id);
            } else {

            }

            // Update visual

                const chId = parseInt(el.dataset.id);
                el.classList.toggle('selected', selectedChapters.includes(chId));

            // Enable/disable buttons

            document.getElementById('btn-qcm').disabled = !hasSelection;

            document.getElementById('btn-simulation').disabled = !hasSelection;

        function startMode(mode) {

        function toggleMultiAnswer(index) {
            const selectedIndex = multiAnswerSelection.indexOf(index);
            if (selectedIndex === -1) {
                multiAnswerSelection.push(index);
            } else {
                multiAnswerSelection.splice(selectedIndex, 1);
            }

            const buttons = document.querySelectorAll('.answer-btn');
            buttons[index].classList.toggle('selected', multiAnswerSelection.includes(index));

            const validateBtn = document.getElementById('btn-validate-multi');
            if (validateBtn) {
                validateBtn.disabled = multiAnswerSelection.length === 0;
            }
        }

        function checkMultiAnswer() {
            const item = currentQuestions[currentIndex];
            const correctAnswers = item.correct;
            const selectedAnswers = [...multiAnswerSelection].sort((a, b) => a - b);
            const expectedAnswers = [...correctAnswers].sort((a, b) => a - b);
            const isCorrect = selectedAnswers.length === expectedAnswers.length &&
                selectedAnswers.every((answer, i) => answer === expectedAnswers[i]);
            const buttons = document.querySelectorAll('.answer-btn');

            buttons.forEach((btn, i) => {
                btn.disabled = true;
                btn.classList.remove('selected');
                if (correctAnswers.includes(i)) {
                    btn.classList.add('correct');
                } else if (selectedAnswers.includes(i)) {
                    btn.classList.add('incorrect');
                }
            });

            const validateBtn = document.getElementById('btn-validate-multi');
            if (validateBtn) {
                validateBtn.disabled = true;
            }

            const explanationDiv = document.getElementById('explanation');
            if (isCorrect) {
                score++;
                document.getElementById('score').textContent = score;
                explanationDiv.innerHTML = `
                    <h4 style="color: var(--success);">Bonne réponse</h4>
                    <p>${item.explanation}</p>
                `;
            } else {
                explanationDiv.innerHTML = `
                    <h4 style="color: var(--error);">Mauvaise réponse</h4>
                    <p>${item.explanation}</p>
                `;
            }

            explanationDiv.classList.add('show');
            document.getElementById('btn-skip').style.display = 'none';
            document.getElementById('btn-next').classList.add('show');
        }

            if (isNaN(userAnswer)) {

        function updateDeindustrializationGraph() {
            const productivityGap = parseFloat(document.getElementById('deind_productivity_gap').value);
            const elasticity = parseFloat(document.getElementById('deind_elasticity').value);
            const incomeElasticity = parseFloat(document.getElementById('deind_income_elasticity').value);

            document.getElementById('deind_productivity_gap-value').textContent = '+ ' + formatNumber(productivityGap, 1) + ' pts/an';
            document.getElementById('deind_elasticity-value').textContent = formatNumber(elasticity, 1);
            document.getElementById('deind_income_elasticity-value').textContent = formatNumber(incomeElasticity, 1);

            const years = 31;
            const initialShare = 25;
            const incomeGrowth = 1.2;
            const industryShare = [];
            const industryVolume = [];
            const initialOdds = initialShare / (100 - initialShare);

            for (let year = 0; year < years; year++) {
                const relativePrice = Math.pow(1 + productivityGap / 100, -year);
                const incomeIndex = Math.pow(1 + incomeGrowth / 100, year);
                const priceVolumeEffect = Math.pow(relativePrice, -elasticity);
                const incomeDemandEffect = Math.pow(incomeIndex, incomeElasticity - 1);
                const relativeValue = Math.pow(relativePrice, 1 - elasticity) * incomeDemandEffect;
                const odds = initialOdds * relativeValue;
                industryShare.push(odds / (1 + odds) * 100);
                industryVolume.push(priceVolumeEffect * Math.pow(incomeIndex, incomeElasticity) * 100);
            }

            const finalShare = industryShare[years - 1];
            const finalVolume = industryVolume[years - 1];
            const shareChange = finalShare - initialShare;
            const shareChangeText = (shareChange >= 0 ? '+ ' : '- ') + formatNumber(Math.abs(shareChange), 1) + ' pts';

            document.getElementById('result-deind-initial-share').textContent = formatNumber(initialShare, 1) + ' % du PIB';
            document.getElementById('result-deind-final-share').textContent = formatNumber(finalShare, 1) + ' % du PIB';
            document.getElementById('result-deind-share-change').textContent = shareChangeText;

            const explanation = document.getElementById('deind-explanation');
            const relativePriceDrop = (1 - Math.pow(1 + productivityGap / 100, -(years - 1))) * 100;
            const shareText = shareChange < 0
                ? `la part de l'industrie dans le PIB baisse de ${formatNumber(Math.abs(shareChange), 1)} points`
                : `la part de l'industrie dans le PIB augmente de ${formatNumber(shareChange, 1)} points`;
            const volumeDirection = finalVolume > 100 ? ", même si la production industrielle en volume augmente" : "";
            let elasticityText;
            if (elasticity > 1) {
                elasticityText = "comme l'élasticité est supérieure à 1, la baisse du prix entraîne une hausse plus que proportionnelle des quantités demandées : l'effet volume l'emporte sur l'effet prix";
            } else if (elasticity < 1) {
                elasticityText = "comme l'élasticité est inférieure à 1, les quantités demandées augmentent moins que proportionnellement à la baisse du prix : l'effet prix l'emporte sur l'effet volume";
            } else {
                elasticityText = "avec une élasticité égale à 1, la baisse du prix et la hausse des quantités se compensent exactement : la part en valeur reste stable";
            }
            let incomeElasticityText;
            if (incomeElasticity > 1) {
                incomeElasticityText = "comme l'élasticité-revenu est supérieure à 1, la demande de biens industriels augmente plus vite que le revenu réel";
            } else if (incomeElasticity < 1) {
                incomeElasticityText = "comme l'élasticité-revenu est inférieure à 1, la demande de biens industriels augmente moins vite que le revenu réel : une partie de la dépense se déplace vers les services";
            } else {
                incomeElasticityText = "avec une élasticité-revenu égale à 1, la hausse du revenu réel ne déforme pas la demande entre biens industriels et services";
            }

            explanation.innerHTML = `
                <strong>Lecture du scénario :</strong> avec un écart de productivité de ${formatNumber(productivityGap, 1)} points par an, le prix relatif des biens industriels baisse d'environ ${formatNumber(relativePriceDrop, 0)} % en trente ans. ${elasticityText}. ${incomeElasticityText}. Au total, ${shareText}${volumeDirection}.<br><br>
                <strong>Mécanisme :</strong> la part de l'industrie dans le PIB est une part en valeur : prix × quantité. Les gains de productivité industriels font baisser le prix relatif des biens industriels, ce qui tire leur part en valeur vers le bas. Cette baisse de prix peut toutefois stimuler les volumes achetés. À cela s'ajoute un effet revenu : quand le niveau de vie augmente, les ménages consacrent une part croissante de leur dépense aux services.<br><br>
                <strong>Rôle des élasticités :</strong> l'élasticité-prix indique si les volumes réagissent fortement à la baisse du prix des biens industriels. L'élasticité-revenu indique si la demande de biens industriels augmente aussi vite que le revenu. Si l'élasticité-prix est inférieure à 1, l'effet prix domine l'effet volume. Si l'élasticité-revenu est inférieure à 1, la hausse du niveau de vie déforme la demande au profit des services.<br><br>
                <strong>Repère historique :</strong> En 2024, la valeur ajoutée manufacturière est d'environ 279 Md€ en France, soit 10,7 % du PIB. Entre 1990 et 2019, le prix de la valeur ajoutée manufacturière a baissé de 2 % tandis qu'il augmentait de 53 % dans l'ensemble de l'économie. En parallèle, la structure du panier de biens des consommateurs tend à se modifier au profit de services au fur et à mesure que leur revenu réel augmente : le poids des biens industriels dans la consommation s'élevait à 57,3 % en 1950, contre 36,5 % en 2000, 33,4 % en 2010 et 32,1 % en 2017.
            `;

            const canvas = document.getElementById('deindustrializationCanvas');
            const ctx = canvas.getContext('2d');
            const dpr = (typeof window !== 'undefined' && window.devicePixelRatio) ? Math.min(window.devicePixelRatio, 2) : 1;
            const rect = canvas.getBoundingClientRect ? canvas.getBoundingClientRect() : null;
            const width = Math.round((rect && rect.width) || canvas.clientWidth || canvas.width || 800);
            const height = Math.round((rect && rect.height) || canvas.clientHeight || canvas.height || 430);
            const targetWidth = Math.round(width * dpr);
            const targetHeight = Math.round(height * dpr);
            if (canvas.width !== targetWidth || canvas.height !== targetHeight) {
                canvas.width = targetWidth;
                canvas.height = targetHeight;
            }
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            const padding = { top: 46, right: 88, bottom: 62, left: 78 };
            const graphWidth = width - padding.left - padding.right;
            const graphHeight = height - padding.top - padding.bottom;

            ctx.clearRect(0, 0, width, height);

            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';

            const yMax = Math.max(30, Math.ceil((Math.max(...industryShare) + 1) / 5) * 5);
            const yScale = value => padding.top + graphHeight - (value / yMax) * graphHeight;
            const xScale = index => padding.left + (index / (years - 1)) * graphWidth;

            ctx.strokeStyle = '#e7e5df';
            ctx.lineWidth = 1;
            for (let i = 0; i <= 5; i++) {
                const y = padding.top + (i / 5) * graphHeight;
                ctx.beginPath();
                ctx.moveTo(padding.left, y + 0.5);
                ctx.lineTo(width - padding.right, y + 0.5);
                ctx.stroke();
            }

            ctx.strokeStyle = '#3f3a35';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(padding.left + 0.5, padding.top);
            ctx.lineTo(padding.left + 0.5, height - padding.bottom);
            ctx.lineTo(width - padding.right, height - padding.bottom + 0.5);
            ctx.lineTo(width - padding.right, padding.top);
            ctx.stroke();

            ctx.fillStyle = '#5f5a54';
            ctx.font = '13px Segoe UI, sans-serif';
            ctx.textAlign = 'center';
            for (let year = 0; year <= 30; year += 5) {
                ctx.fillText('n+' + year, xScale(year), height - padding.bottom + 22);
            }
            ctx.fillText('Années', padding.left + graphWidth / 2, height - 14);

            ctx.textAlign = 'right';
            for (let i = 0; i <= 5; i++) {
                const value = (i / 5) * yMax;
                const y = yScale(value);
                ctx.fillText(formatNumber(value, 0) + ' %', padding.left - 12, y + 4);
            }
            ctx.save();
            ctx.translate(20, padding.top + graphHeight / 2);
            ctx.rotate(-Math.PI / 2);
            ctx.textAlign = 'center';
            ctx.font = '13px Segoe UI, sans-serif';
            ctx.fillText("Part de l'industrie (% du PIB)", 0, 0);
            ctx.restore();

            function drawLine(values, scale, color) {
                ctx.strokeStyle = color;
                ctx.lineWidth = 3;
                ctx.beginPath();
                values.forEach((value, index) => {
                    const x = xScale(index);
                    const y = scale(value);
                    if (index === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                });
                ctx.stroke();
            }

            drawLine(industryShare, yScale, '#dc2626');

            ctx.fillStyle = '#dc2626';
            ctx.beginPath();
            ctx.arc(xScale(years - 1), yScale(finalShare), 4, 0, Math.PI * 2);
            ctx.fill();

            ctx.font = '600 13px Segoe UI, sans-serif';
            ctx.fillStyle = '#dc2626';
            ctx.textAlign = 'left';
            ctx.fillText(formatNumber(initialShare, 1) + ' %', xScale(0) + 10, yScale(initialShare) - 10);
            ctx.fillText(formatNumber(finalShare, 1) + ' %', xScale(years - 1) + 10, yScale(finalShare) + 4);

            ctx.font = '600 14px Segoe UI, sans-serif';
            ctx.fillStyle = '#3f3a35';
            ctx.textAlign = 'left';
            ctx.fillText("Part de l'industrie dans le PIB", padding.left + 14, padding.top + 18);
        }

        function updateOutputGapGraph() {
            // Récupérer les valeurs des curseurs
            const initialGap = parseFloat(document.getElementById('initial_gap').value);
            const gPotential = parseFloat(document.getElementById('g_potential').value);
            const gEffective = parseFloat(document.getElementById('g_effective').value);

            // Mettre à jour les affichages des valeurs
            document.getElementById('initial_gap-value').textContent = initialGap.toFixed(1).replace('.', ',') + ' %';
            document.getElementById('g_potential-value').textContent = gPotential.toFixed(1).replace('.', ',') + ' %';
            document.getElementById('g_effective-value').textContent = gEffective.toFixed(1).replace('.', ',') + ' %';

            // Afficher/masquer le bouton "Fermer l'écart" selon l'écart initial
            const btnCloseGap = document.getElementById('btn-close-gap');
            if (btnCloseGap) {
                btnCloseGap.style.display = (initialGap !== 0) ? 'block' : 'none';
            }

            // Calculer les données sur 5 ans (n+5)
            const years = 6;
            const pibPotentiel = [100]; // Base 100
            const pibEffectif = [100 * (1 + initialGap / 100)]; // Ajusté de l'écart initial

            for (let i = 1; i < years; i++) {
                pibPotentiel.push(pibPotentiel[i-1] * (1 + gPotential / 100));
                pibEffectif.push(pibEffectif[i-1] * (1 + gEffective / 100));
            }

            // Calculer l'écart final
            const finalGap = ((pibEffectif[years-1] - pibPotentiel[years-1]) / pibPotentiel[years-1] * 100);

            // Mettre à jour les résultats
            document.getElementById('result-initial-gap').textContent = initialGap.toFixed(1).replace('.', ',') + ' %';
            document.getElementById('result-final-gap').textContent = finalGap.toFixed(1).replace('.', ',') + ' %';

            // Fonction pour mettre à jour un statut d'écart
            function updateGapStatus(elementId, gapValue) {
                const statusEl = document.getElementById(elementId);
                if (!statusEl) return;
                if (Math.abs(gapValue) < 0.3) {
                    statusEl.textContent = '✓ Économie à son potentiel';
                    statusEl.style.background = 'var(--success-bg)';
                    statusEl.style.color = 'var(--success)';
                } else if (gapValue > 0) {
                    statusEl.textContent = '🔥 Surchauffe';
                    statusEl.style.background = '#fef3c7';
                    statusEl.style.color = '#d97706';
                } else {
                    statusEl.textContent = '❄️ Sous-régime';
                    statusEl.style.background = '#dbeafe';
                    statusEl.style.color = '#2563eb';
                }
            }

            // Mettre à jour les statuts (surchauffe ou sous-emploi) pour les deux écarts
            updateGapStatus('gap-status-initial', initialGap);
            updateGapStatus('gap-status-final', finalGap);

            // Dessiner le graphique
            const canvas = document.getElementById('outputGapCanvas');
            const ctx = canvas.getContext('2d');

            // Dimensions
            const width = canvas.width;
            const height = canvas.height;
            const padding = { top: 30, right: 30, bottom: 50, left: 60 };
            const graphWidth = width - padding.left - padding.right;
            const graphHeight = height - padding.top - padding.bottom;

            // Effacer le canvas
            ctx.clearRect(0, 0, width, height);

            // Trouver les min/max pour l'échelle
            const allValues = [...pibPotentiel, ...pibEffectif];
            const minVal = Math.min(...allValues) * 0.98;
            const maxVal = Math.max(...allValues) * 1.02;

            // Fonctions de conversion
            const xScale = (i) => padding.left + (i / (years - 1)) * graphWidth;
            const yScale = (v) => padding.top + graphHeight - ((v - minVal) / (maxVal - minVal)) * graphHeight;

            // Dessiner la grille
            ctx.strokeStyle = '#e0e0e0';
            ctx.lineWidth = 1;
            for (let i = 0; i <= 5; i++) {
                const y = padding.top + (i / 5) * graphHeight;
                ctx.beginPath();
                ctx.moveTo(padding.left, y);
                ctx.lineTo(width - padding.right, y);
                ctx.stroke();
            }

            // Dessiner les axes
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(padding.left, padding.top);
            ctx.lineTo(padding.left, height - padding.bottom);
            ctx.lineTo(width - padding.right, height - padding.bottom);
            ctx.stroke();

            // Labels axe X (années)
            ctx.fillStyle = '#666';
            ctx.font = '12px Segoe UI, sans-serif';
            ctx.textAlign = 'center';
            for (let i = 0; i < years; i++) {
                const label = i === 0 ? '0' : 'n+' + i;
                ctx.fillText(label, xScale(i), height - padding.bottom + 20);
            }
            ctx.fillText('Années', width / 2, height - 10);

            // Labels axe Y
            ctx.textAlign = 'right';
            for (let i = 0; i <= 5; i++) {
                const val = minVal + (i / 5) * (maxVal - minVal);
                const y = padding.top + graphHeight - (i / 5) * graphHeight;
                ctx.fillText(val.toFixed(0), padding.left - 10, y + 4);
            }
            ctx.save();
            ctx.translate(15, height / 2);
            ctx.rotate(-Math.PI / 2);
            ctx.textAlign = 'center';
            ctx.fillText('PIB (base 100)', 0, 0);
            ctx.restore();

            // Dessiner la courbe du PIB potentiel (rouge pointillé)
            ctx.strokeStyle = '#dc2626';
            ctx.lineWidth = 3;
            ctx.setLineDash([8, 4]);
            ctx.beginPath();
            for (let i = 0; i < years; i++) {
                const x = xScale(i);
                const y = yScale(pibPotentiel[i]);
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.stroke();

            // Dessiner la courbe du PIB effectif (bleu plein)
            ctx.strokeStyle = '#2563eb';
            ctx.lineWidth = 3;
            ctx.setLineDash([]);
            ctx.beginPath();
            for (let i = 0; i < years; i++) {
                const x = xScale(i);
                const y = yScale(pibEffectif[i]);
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.stroke();

            // Colorier la zone entre les deux courbes
            // Bleu froid = sous-emploi (PIB effectif < potentiel), Orange chaud = surchauffe (PIB effectif > potentiel)
            ctx.fillStyle = finalGap < 0 ? 'rgba(59, 130, 246, 0.2)' : 'rgba(249, 115, 22, 0.2)';
            ctx.beginPath();
            for (let i = 0; i < years; i++) {
                const x = xScale(i);
                const y = yScale(pibEffectif[i]);
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            for (let i = years - 1; i >= 0; i--) {
                const x = xScale(i);
                const y = yScale(pibPotentiel[i]);
                ctx.lineTo(x, y);
            }
            ctx.closePath();
            ctx.fill();

            // Légende
            ctx.font = '14px Segoe UI, sans-serif';
            const legendX = width - padding.right - 180;
            const legendY = padding.top + 10;

            ctx.fillStyle = '#2563eb';
            ctx.fillRect(legendX, legendY, 20, 3);
            ctx.fillStyle = '#333';
            ctx.textAlign = 'left';
            ctx.fillText('PIB effectif', legendX + 30, legendY + 5);

            ctx.strokeStyle = '#dc2626';
            ctx.setLineDash([5, 3]);
            ctx.beginPath();
            ctx.moveTo(legendX, legendY + 25);
            ctx.lineTo(legendX + 20, legendY + 25);
            ctx.stroke();
            ctx.setLineDash([]);
            ctx.fillText('PIB potentiel', legendX + 30, legendY + 28);
        }

        function closeGapIn5Years() {
            const initialGap = parseFloat(document.getElementById('initial_gap').value);
            const gPotential = parseFloat(document.getElementById('g_potential').value);

            if (initialGap === 0) {
                document.getElementById('simulation-explanation').innerHTML =
                    '<strong>L\'écart est déjà nul !</strong> Le PIB effectif est égal au PIB potentiel.';
                return;
            }

            // Calculer le taux de croissance effective nécessaire pour fermer l'écart en 5 ans
            // PIB effectif initial * (1 + g_eff)^5 = PIB potentiel initial * (1 + g_pot)^5
            const pibEffectifInitial = 100 * (1 + initialGap / 100);
            const pibPotentielFinal = 100 * Math.pow(1 + gPotential / 100, 5);
            const gEffectiveNeeded = (Math.pow(pibPotentielFinal / pibEffectifInitial, 1/5) - 1) * 100;

            // Limiter aux bornes du curseur
            const gEffectiveClamped = Math.max(-1, Math.min(4, gEffectiveNeeded));

            // Mettre à jour le curseur
            document.getElementById('g_effective').value = gEffectiveClamped.toFixed(1);
            updateOutputGapGraph();

            // Afficher le message pédagogique
            const message = `<strong>Fermeture de l'écart en 5 ans :</strong> Avec un écart de production initial de ${initialGap.toFixed(1).replace('.', ',')} % et une croissance potentielle de ${gPotential.toFixed(1).replace('.', ',')} %, il faut que la croissance effective s'élève à ${gEffectiveClamped.toFixed(1).replace('.', ',')} % par an sur la période pour ramener le PIB à son niveau potentiel après 5 ans.`;

            if (gEffectiveNeeded > 4 || gEffectiveNeeded < -1) {
                document.getElementById('simulation-explanation').innerHTML = message +
                    `<br><br><em>Note : le taux calculé (${gEffectiveNeeded.toFixed(1).replace('.', ',')} %) dépasse les bornes réalistes du curseur.</em>`;
            } else {
                document.getElementById('simulation-explanation').innerHTML = message;
            }
        }

        // ==========================================
        // SIMULATION : DYNAMIQUE DE L'ENDETTEMENT
        // ==========================================
        function updateDebtDynamicsGraph() {
            // Récupérer les valeurs des curseurs
            const debtInitial = parseFloat(document.getElementById('debt_initial').value);
            const gReal = parseFloat(document.getElementById('g_real').value);
            const inflation = parseFloat(document.getElementById('inflation').value);
            const rInterest = parseFloat(document.getElementById('r_interest').value);
            const primaryBalance = parseFloat(document.getElementById('primary_balance').value);

            // Calculer la croissance nominale
            const gNominal = gReal + inflation;
            const rMinusG = rInterest - gNominal;

            // Mettre à jour les affichages des valeurs
            document.getElementById('debt_initial-value').textContent = debtInitial.toFixed(0) + ' %';
            document.getElementById('g_real-value').textContent = gReal.toFixed(1).replace('.', ',') + ' %';
            document.getElementById('inflation-value').textContent = inflation.toFixed(1).replace('.', ',') + ' %';
            document.getElementById('r_interest-value').textContent = rInterest.toFixed(1).replace('.', ',') + ' %';
            document.getElementById('primary_balance-value').textContent = (primaryBalance >= 0 ? '+ ' : '- ') + Math.abs(primaryBalance).toFixed(1).replace('.', ',') + ' %';

            // Calculer l'évolution de la dette sur 10 ans
            const years = 11;
            const debtPath = [debtInitial];

            for (let i = 1; i < years; i++) {
                // Équation simplifiée : d(t+1) = d(t) + d(t) * (r - g) - s
                const snowballEffect = debtPath[i-1] * rMinusG / 100;
                const newDebt = debtPath[i-1] + snowballEffect - primaryBalance;
                debtPath.push(Math.max(0, newDebt)); // La dette ne peut pas être négative
            }

            const finalDebt = debtPath[years - 1];
            const debtChange = finalDebt - debtInitial;

            // Mettre à jour les résultats
            document.getElementById('result-g-nominal').textContent = gNominal.toFixed(1).replace('.', ',') + ' %';
            document.getElementById('result-r-minus-g').textContent = (rMinusG >= 0 ? '+ ' : '- ') + Math.abs(rMinusG).toFixed(1).replace('.', ',') + ' %';
            document.getElementById('result-debt-final').textContent = finalDebt.toFixed(0).replace('.', ',') + ' %';

            // Mettre à jour le statut de l'effet boule de neige
            const snowballStatus = document.getElementById('snowball-status');
            if (Math.abs(rMinusG) < 0.2) {
                snowballStatus.textContent = '≈ Neutre';
                snowballStatus.style.background = '#f3f4f6';
                snowballStatus.style.color = '#6b7280';
            } else if (rMinusG > 0) {
                snowballStatus.textContent = '⚠️ Effet boule de neige';
                snowballStatus.style.background = '#fef3c7';
                snowballStatus.style.color = '#d97706';
            } else {
                snowballStatus.textContent = '✓ Effet siphon';
                snowballStatus.style.background = 'var(--success-bg)';
                snowballStatus.style.color = 'var(--success)';
            }

            // Mettre à jour le statut de la tendance de la dette
            const debtTrend = document.getElementById('debt-trend');
            if (Math.abs(debtChange) < 2) {
                debtTrend.textContent = '≈ Stable';
                debtTrend.style.background = 'var(--success-bg)';
                debtTrend.style.color = 'var(--success)';
            } else if (debtChange > 0) {
                debtTrend.textContent = '📈 En hausse (+ ' + debtChange.toFixed(0) + ' pts)';
                debtTrend.style.background = 'var(--error-bg)';
                debtTrend.style.color = 'var(--error)';
            } else {
                debtTrend.textContent = '📉 En baisse (- ' + Math.abs(debtChange).toFixed(0) + ' pts)';
                debtTrend.style.background = 'var(--success-bg)';
                debtTrend.style.color = 'var(--success)';
            }

            // Dessiner le graphique
            const canvas = document.getElementById('debtDynamicsCanvas');
            const ctx = canvas.getContext('2d');

            // Dimensions
            const width = canvas.width;
            const height = canvas.height;
            const padding = { top: 30, right: 30, bottom: 50, left: 70 };
            const graphWidth = width - padding.left - padding.right;
            const graphHeight = height - padding.top - padding.bottom;

            // Effacer le canvas
            ctx.clearRect(0, 0, width, height);

            // Trouver les min/max pour l'échelle
            const minVal = Math.min(...debtPath, debtInitial * 0.9) * 0.95;
            const maxVal = Math.max(...debtPath, debtInitial * 1.1) * 1.05;

            // Fonctions de conversion
            const xScale = (i) => padding.left + (i / (years - 1)) * graphWidth;
            const yScale = (v) => padding.top + graphHeight - ((v - minVal) / (maxVal - minVal)) * graphHeight;

            // Dessiner la grille horizontale
            ctx.strokeStyle = '#e0e0e0';
            ctx.lineWidth = 1;
            for (let i = 0; i <= 5; i++) {
                const y = padding.top + (i / 5) * graphHeight;
                ctx.beginPath();
                ctx.moveTo(padding.left, y);
                ctx.lineTo(width - padding.right, y);
                ctx.stroke();
            }

            // Dessiner la ligne de référence (endettement initial)
            ctx.strokeStyle = '#9ca3af';
            ctx.lineWidth = 1;
            ctx.setLineDash([4, 4]);
            const yInitial = yScale(debtInitial);
            ctx.beginPath();
            ctx.moveTo(padding.left, yInitial);
            ctx.lineTo(width - padding.right, yInitial);
            ctx.stroke();
            ctx.setLineDash([]);

            // Dessiner les axes
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(padding.left, padding.top);
            ctx.lineTo(padding.left, height - padding.bottom);
            ctx.lineTo(width - padding.right, height - padding.bottom);
            ctx.stroke();

            // Labels axe X (années)
            ctx.fillStyle = '#666';
            ctx.font = '12px Segoe UI, sans-serif';
            ctx.textAlign = 'center';
            for (let i = 0; i < years; i++) {
                const label = i === 0 ? 'n' : 'n+' + i;
                ctx.fillText(label, xScale(i), height - padding.bottom + 20);
            }
            ctx.fillText('Années', width / 2, height - 10);

            // Labels axe Y
            ctx.textAlign = 'right';
            for (let i = 0; i <= 5; i++) {
                const val = minVal + (i / 5) * (maxVal - minVal);
                const y = padding.top + graphHeight - (i / 5) * graphHeight;
                ctx.fillText(val.toFixed(0) + ' %', padding.left - 10, y + 4);
            }
            ctx.save();
            ctx.translate(18, height / 2);
            ctx.rotate(-Math.PI / 2);
            ctx.textAlign = 'center';
            ctx.fillText('Dette / PIB', 0, 0);
            ctx.restore();

            // Colorier la zone sous la courbe
            const isIncreasing = finalDebt > debtInitial;
            ctx.fillStyle = isIncreasing ? 'rgba(239, 68, 68, 0.15)' : 'rgba(34, 197, 94, 0.15)';
            ctx.beginPath();
            ctx.moveTo(xScale(0), yScale(debtInitial));
            for (let i = 0; i < years; i++) {
                ctx.lineTo(xScale(i), yScale(debtPath[i]));
            }
            ctx.lineTo(xScale(years - 1), yScale(debtInitial));
            ctx.closePath();
            ctx.fill();

            // Dessiner la courbe de la dette
            ctx.strokeStyle = isIncreasing ? '#dc2626' : '#22c55e';
            ctx.lineWidth = 3;
            ctx.beginPath();
            for (let i = 0; i < years; i++) {
                const x = xScale(i);
                const y = yScale(debtPath[i]);
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.stroke();

            // Dessiner les points
            ctx.fillStyle = isIncreasing ? '#dc2626' : '#22c55e';
            for (let i = 0; i < years; i++) {
                ctx.beginPath();
                ctx.arc(xScale(i), yScale(debtPath[i]), 4, 0, Math.PI * 2);
                ctx.fill();
            }

            // Légende
            ctx.font = '12px Segoe UI, sans-serif';
            const legendX = width - padding.right - 200;
            const legendY = padding.top + 10;

            ctx.fillStyle = isIncreasing ? '#dc2626' : '#22c55e';
            ctx.fillRect(legendX, legendY, 20, 3);
            ctx.fillStyle = '#333';
            ctx.textAlign = 'left';
            ctx.fillText('Trajectoire de la dette', legendX + 30, legendY + 5);

            ctx.strokeStyle = '#9ca3af';
            ctx.setLineDash([4, 4]);
            ctx.beginPath();
            ctx.moveTo(legendX, legendY + 20);
            ctx.lineTo(legendX + 20, legendY + 20);
            ctx.stroke();
            ctx.setLineDash([]);
            ctx.fillText('Niveau initial (' + debtInitial + ' %)', legendX + 30, legendY + 23);
        }

        function stabilizeDebt() {
            const debtInitial = parseFloat(document.getElementById('debt_initial').value);
            const gReal = parseFloat(document.getElementById('g_real').value);
            const inflation = parseFloat(document.getElementById('inflation').value);
            const rInterest = parseFloat(document.getElementById('r_interest').value);

            const gNominal = gReal + inflation;
            const rMinusG = rInterest - gNominal;

            // Solde primaire stabilisant : s* = d * (r - g)
            const stabilizingBalance = debtInitial * rMinusG / 100;

            // Limiter aux bornes du curseur
            const balanceClamped = Math.max(-5, Math.min(3, stabilizingBalance));

            // Mettre à jour le curseur
            document.getElementById('primary_balance').value = balanceClamped.toFixed(1);
            updateDebtDynamicsGraph();

            // Afficher le message pédagogique
            const balanceType = stabilizingBalance >= 0 ? 'excédent' : 'déficit';
            const balanceAbs = Math.abs(stabilizingBalance).toFixed(1).replace('.', ',');

            let message = `<strong>Solde primaire stabilisant :</strong> Avec un endettement de ${debtInitial} % du PIB, un taux d'intérêt de ${rInterest.toFixed(1).replace('.', ',')} % et une croissance nominale de ${gNominal.toFixed(1).replace('.', ',')} %, il faut un ${balanceType} primaire de <strong>${balanceAbs} % du PIB</strong> pour stabiliser le ratio d'endettement.`;

            if (rMinusG > 0) {
                message += `<br><br><em>Note : l'effet boule de neige étant défavorable (r > g), il faut dégager un excédent primaire pour simplement stabiliser la dette.</em>`;
            } else if (rMinusG < 0) {
                message += `<br><br><em>Note : l'effet siphon étant favorable (r < g), la dette peut être stabilisée même avec un léger déficit primaire.</em>`;
            }

            if (stabilizingBalance > 3 || stabilizingBalance < -5) {
                message += `<br><br><em>⚠️ Le solde calculé (${stabilizingBalance.toFixed(1).replace('.', ',')} %) dépasse les bornes réalistes du curseur.</em>`;
            }

            document.getElementById('debt-simulation-explanation').innerHTML = message;
        }

        // ==========================================
        // SIMULATION : RÈGLE DE TAYLOR
        // ==========================================
        function updateTaylorRuleGraph() {
            // Récupérer les valeurs des curseurs
            const inflation = parseFloat(document.getElementById('taylor_inflation').value);
            const outputGap = parseFloat(document.getElementById('taylor_output_gap').value);
            const userRate = parseFloat(document.getElementById('taylor_user_rate').value);
            const targetInflation = parseFloat(document.getElementById('taylor_target_inflation').value);
            const rStar = parseFloat(document.getElementById('taylor_r_star').value);

            // Calculer le taux Taylor
            // i = r* + π + 0.5*(π - π*) + 0.5*y
            const taylorRate = rStar + inflation + 0.5 * (inflation - targetInflation) + 0.5 * outputGap;

            // Mettre à jour les affichages des valeurs
            document.getElementById('taylor_inflation-value').textContent = inflation.toFixed(1).replace('.', ',') + ' %';
            document.getElementById('taylor_output_gap-value').textContent = (outputGap >= 0 ? '+ ' : '- ') + Math.abs(outputGap).toFixed(1).replace('.', ',') + ' %';
            document.getElementById('taylor_user_rate-value').textContent = userRate.toFixed(2).replace('.', ',') + ' %';

            // Mettre à jour les résultats
            document.getElementById('result-user-rate').textContent = userRate.toFixed(2).replace('.', ',') + ' %';
            document.getElementById('result-taylor-rate').textContent = taylorRate.toFixed(2).replace('.', ',') + ' %';

            // Calculer l'écart et le positionnement
            const ecart = userRate - taylorRate;
            const stanceStatus = document.getElementById('taylor-stance-status');
            const stanceValue = document.getElementById('result-stance');

            if (Math.abs(ecart) < 0.3) {
                stanceValue.textContent = '≈ Conforme';
                stanceStatus.textContent = 'Vous suivez Taylor';
                stanceStatus.style.background = 'var(--success-bg)';
                stanceStatus.style.color = 'var(--success)';
            } else if (ecart > 0) {
                stanceValue.textContent = '+ ' + ecart.toFixed(1).replace('.', ',') + ' pts';
                stanceStatus.textContent = 'Plus restrictif';
                stanceStatus.style.background = '#fef3c7';
                stanceStatus.style.color = '#d97706';
            } else {
                stanceValue.textContent = '- ' + Math.abs(ecart).toFixed(1).replace('.', ',') + ' pts';
                stanceStatus.textContent = 'Plus accommodant';
                stanceStatus.style.background = '#dbeafe';
                stanceStatus.style.color = '#2563eb';
            }

            // Dessiner le graphique
            const canvas = document.getElementById('taylorRuleCanvas');
            const ctx = canvas.getContext('2d');

            // Dimensions
            const width = canvas.width;
            const height = canvas.height;
            const padding = { top: 40, right: 30, bottom: 60, left: 70 };
            const graphWidth = width - padding.left - padding.right;
            const graphHeight = height - padding.top - padding.bottom;

            // Effacer le canvas
            ctx.clearRect(0, 0, width, height);

            // Plage d'inflation pour le graphique (0 à 8%)
            const inflationMin = 0;
            const inflationMax = 8;

            // Calculer les taux Taylor pour différentes inflations (avec l'écart de production actuel)
            const taylorLine = [];
            for (let pi = inflationMin; pi <= inflationMax; pi += 0.1) {
                const rate = rStar + pi + 0.5 * (pi - targetInflation) + 0.5 * outputGap;
                taylorLine.push({ inflation: pi, rate: rate });
            }

            // Déterminer l'échelle Y
            const allRates = taylorLine.map(p => p.rate).concat([userRate, 0]);
            const rateMin = Math.min(...allRates) - 1;
            const rateMax = Math.max(...allRates) + 1;

            // Fonctions de conversion
            const xScale = (pi) => padding.left + ((pi - inflationMin) / (inflationMax - inflationMin)) * graphWidth;
            const yScale = (r) => padding.top + graphHeight - ((r - rateMin) / (rateMax - rateMin)) * graphHeight;

            // Dessiner les zones (accommodante vs restrictive)
            // Zone accommodante (sous la ligne Taylor)
            ctx.fillStyle = 'rgba(59, 130, 246, 0.08)';
            ctx.beginPath();
            ctx.moveTo(padding.left, yScale(taylorLine[0].rate));
            taylorLine.forEach(p => ctx.lineTo(xScale(p.inflation), yScale(p.rate)));
            ctx.lineTo(width - padding.right, height - padding.bottom);
            ctx.lineTo(padding.left, height - padding.bottom);
            ctx.closePath();
            ctx.fill();

            // Zone restrictive (au-dessus de la ligne Taylor)
            ctx.fillStyle = 'rgba(245, 158, 11, 0.08)';
            ctx.beginPath();
            ctx.moveTo(padding.left, yScale(taylorLine[0].rate));
            taylorLine.forEach(p => ctx.lineTo(xScale(p.inflation), yScale(p.rate)));
            ctx.lineTo(width - padding.right, padding.top);
            ctx.lineTo(padding.left, padding.top);
            ctx.closePath();
            ctx.fill();

            // Dessiner la grille horizontale
            ctx.strokeStyle = '#e0e0e0';
            ctx.lineWidth = 1;
            const yTicks = 6;
            for (let i = 0; i <= yTicks; i++) {
                const y = padding.top + (i / yTicks) * graphHeight;
                ctx.beginPath();
                ctx.moveTo(padding.left, y);
                ctx.lineTo(width - padding.right, y);
                ctx.stroke();
            }

            // Dessiner la grille verticale
            for (let pi = 0; pi <= 8; pi += 1) {
                const x = xScale(pi);
                ctx.beginPath();
                ctx.moveTo(x, padding.top);
                ctx.lineTo(x, height - padding.bottom);
                ctx.stroke();
            }

            // Dessiner la ligne de cible d'inflation (verticale)
            ctx.strokeStyle = '#9ca3af';
            ctx.lineWidth = 1;
            ctx.setLineDash([4, 4]);
            const xTarget = xScale(targetInflation);
            ctx.beginPath();
            ctx.moveTo(xTarget, padding.top);
            ctx.lineTo(xTarget, height - padding.bottom);
            ctx.stroke();
            ctx.setLineDash([]);

            // Dessiner les axes
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(padding.left, padding.top);
            ctx.lineTo(padding.left, height - padding.bottom);
            ctx.lineTo(width - padding.right, height - padding.bottom);
            ctx.stroke();

            // Labels axe X (inflation)
            ctx.fillStyle = '#666';
            ctx.font = '12px Segoe UI, sans-serif';
            ctx.textAlign = 'center';
            for (let pi = 0; pi <= 8; pi += 1) {
                ctx.fillText(pi + ' %', xScale(pi), height - padding.bottom + 20);
            }
            ctx.fillText('Inflation', width / 2, height - 15);

            // Labels axe Y (taux directeur)
            ctx.textAlign = 'right';
            for (let i = 0; i <= yTicks; i++) {
                const val = rateMax - (i / yTicks) * (rateMax - rateMin);
                const y = padding.top + (i / yTicks) * graphHeight;
                ctx.fillText(val.toFixed(1).replace('.', ',') + ' %', padding.left - 10, y + 4);
            }
            ctx.save();
            ctx.translate(18, height / 2);
            ctx.rotate(-Math.PI / 2);
            ctx.textAlign = 'center';
            ctx.fillText('Taux directeur', 0, 0);
            ctx.restore();

            // Dessiner la courbe de Taylor
            ctx.strokeStyle = '#2563eb';
            ctx.lineWidth = 3;
            ctx.beginPath();
            taylorLine.forEach((p, i) => {
                const x = xScale(p.inflation);
                const y = yScale(p.rate);
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            });
            ctx.stroke();

            // Dessiner le point Taylor (intersection avec l'inflation actuelle)
            const xTaylor = xScale(inflation);
            const yTaylor = yScale(taylorRate);
            ctx.fillStyle = '#2563eb';
            ctx.beginPath();
            ctx.arc(xTaylor, yTaylor, 8, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.arc(xTaylor, yTaylor, 4, 0, Math.PI * 2);
            ctx.fill();

            // Dessiner le point utilisateur
            const yUser = yScale(userRate);
            ctx.fillStyle = '#f97316';
            ctx.beginPath();
            ctx.arc(xTaylor, yUser, 10, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.arc(xTaylor, yUser, 5, 0, Math.PI * 2);
            ctx.fill();

            // Dessiner la ligne d'écart entre les deux points
            if (Math.abs(ecart) > 0.1) {
                ctx.strokeStyle = ecart > 0 ? '#d97706' : '#2563eb';
                ctx.lineWidth = 2;
                ctx.setLineDash([5, 3]);
                ctx.beginPath();
                ctx.moveTo(xTaylor, yTaylor);
                ctx.lineTo(xTaylor, yUser);
                ctx.stroke();
                ctx.setLineDash([]);

                // Afficher l'écart
                ctx.fillStyle = ecart > 0 ? '#d97706' : '#2563eb';
                ctx.font = 'bold 11px Segoe UI, sans-serif';
                ctx.textAlign = 'left';
                const ecartLabel = (ecart > 0 ? '+ ' : '- ') + Math.abs(ecart).toFixed(1).replace('.', ',') + ' pts';
                ctx.fillText(ecartLabel, xTaylor + 15, (yTaylor + yUser) / 2);
            }

            // Légende
            ctx.font = '12px Segoe UI, sans-serif';
            const legendX = width - padding.right - 180;
            const legendY = padding.top + 10;

            // Ligne Taylor
            ctx.strokeStyle = '#2563eb';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(legendX, legendY);
            ctx.lineTo(legendX + 25, legendY);
            ctx.stroke();
            ctx.fillStyle = '#333';
            ctx.textAlign = 'left';
            ctx.fillText('Taux Taylor', legendX + 35, legendY + 4);

            // Point utilisateur
            ctx.fillStyle = '#f97316';
            ctx.beginPath();
            ctx.arc(legendX + 12, legendY + 20, 6, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#333';
            ctx.fillText('Votre décision', legendX + 35, legendY + 24);

            // Cible d'inflation
            ctx.strokeStyle = '#9ca3af';
            ctx.setLineDash([4, 4]);
            ctx.beginPath();
            ctx.moveTo(legendX, legendY + 40);
            ctx.lineTo(legendX + 25, legendY + 40);
            ctx.stroke();
            ctx.setLineDash([]);
            ctx.fillStyle = '#333';
            ctx.fillText('Cible π* = ' + targetInflation + ' %', legendX + 35, legendY + 44);

            // Mettre à jour l'explication dynamique
            updateTaylorExplanation(inflation, outputGap, targetInflation, rStar, taylorRate, userRate, ecart);
        }

        function updateTaylorExplanation(inflation, outputGap, targetInflation, rStar, taylorRate, userRate, ecart) {
            const explanationDiv = document.getElementById('taylor-simulation-explanation');

            // Décomposition du taux Taylor
            const inflationGap = inflation - targetInflation;
            const inflationContrib = 0.5 * inflationGap;
            const outputContrib = 0.5 * outputGap;

            let html = `<strong>La règle de Taylor :</strong>`;
            html += `<div style="background: #f1f5f9; padding: 10px; border-radius: 8px; font-family: monospace; margin: 8px 0; text-align: center;">`;
            html += `i = r* + π + 0,5 × (π − π*) + 0,5 × écart de production`;
            html += `</div>`;
            html += `<div style="text-align: right; margin-bottom: 10px;"><a href="#" onclick="setTaylorOptimal(); return false;" style="color: var(--primary); font-size: 0.9em;">→ Appliquer ce taux</a></div>`;
            html += `<p style="margin: 10px 0; font-size: 0.9em; color: var(--text-light);">Avec vos données, cela donne :</p>`;
            html += `<table style="width: 100%; border-collapse: collapse; font-size: 0.95em;">`;
            html += `<tr><td style="padding: 4px 8px;">Taux réel d'équilibre (r*)</td><td style="padding: 4px 8px; text-align: right; font-weight: 600;">${rStar.toFixed(1).replace('.', ',')} %</td></tr>`;
            html += `<tr><td style="padding: 4px 8px;">+ Inflation actuelle (π)</td><td style="padding: 4px 8px; text-align: right; font-weight: 600;">+ ${inflation.toFixed(1).replace('.', ',')} %</td></tr>`;
            html += `<tr><td style="padding: 4px 8px;">+ Réaction à l'écart d'inflation <span style="color: var(--text-light); font-size: 0.85em;">[0,5 × (${inflation.toFixed(1).replace('.', ',')} − ${targetInflation.toFixed(1).replace('.', ',')})]</span></td><td style="padding: 4px 8px; text-align: right; font-weight: 600; color: ${inflationContrib >= 0 ? '#d97706' : '#2563eb'};">${inflationContrib >= 0 ? '+ ' : '- '}${Math.abs(inflationContrib).toFixed(1).replace('.', ',')} %</td></tr>`;
            html += `<tr><td style="padding: 4px 8px;">+ Réaction à l'écart de production <span style="color: var(--text-light); font-size: 0.85em;">[0,5 × (${outputGap >= 0 ? '+ ' : '- '}${Math.abs(outputGap).toFixed(1).replace('.', ',')})]</span></td><td style="padding: 4px 8px; text-align: right; font-weight: 600; color: ${outputContrib >= 0 ? '#d97706' : '#2563eb'};">${outputContrib >= 0 ? '+ ' : '- '}${Math.abs(outputContrib).toFixed(1).replace('.', ',')} %</td></tr>`;
            html += `<tr style="border-top: 2px solid var(--border); background: #f8f9fa;"><td style="padding: 8px;"><strong>= Taux Taylor prescrit</strong></td><td style="padding: 8px; text-align: right; font-weight: bold; font-size: 1.1em; color: #2563eb;">${taylorRate.toFixed(2).replace('.', ',')} %</td></tr>`;
            html += `</table>`;

            // Interprétation
            html += `<br><strong>Ce que fait la règle :</strong><br>`;
            html += `Le point de départ (r* + π = ${rStar.toFixed(0)} % + ${inflation.toFixed(1).replace('.', ',')} % = ${(rStar + inflation).toFixed(1).replace('.', ',')} %) assure la <em>neutralité</em> : avec une inflation de ${inflation.toFixed(1).replace('.', ',')} %, un taux nominal de ${(rStar + inflation).toFixed(1).replace('.', ',')} % donne un taux réel de ${rStar.toFixed(0)} % (${(rStar + inflation).toFixed(1).replace('.', ',')} % − ${inflation.toFixed(1).replace('.', ',')} % = ${rStar.toFixed(0)} %) — celui qui ne stimule ni ne freine l'économie. Ensuite, la règle ajuste selon la situation :<br>`;

            if (inflationGap > 0.5) {
                html += `• L'inflation est à ${inflation.toFixed(1).replace('.', ',')} %, soit au-dessus de la cible de ${targetInflation.toFixed(1).replace('.', ',')} %. Pour la faire redescendre, la règle prescrit de <span style="color: #d97706;">monter les taux</span> : cela renchérit le crédit et freine la demande.<br>`;
            } else if (inflationGap < -0.5) {
                html += `• L'inflation est à ${inflation.toFixed(1).replace('.', ',')} %, soit en dessous de la cible. La règle permet des <span style="color: #2563eb;">taux plus bas</span> pour stimuler l'activité sans risque inflationniste.<br>`;
            } else {
                html += `• L'inflation (${inflation.toFixed(1).replace('.', ',')} %) est proche de la cible : pas de correction nécessaire de ce côté.<br>`;
            }

            if (outputGap < -0.5) {
                html += `• L'écart de production est négatif (${outputGap.toFixed(1).replace('.', ',')} %) : le PIB est en dessous de son potentiel. La règle prescrit de <span style="color: #2563eb;">baisser les taux</span> pour soutenir l'activité.<br>`;
            } else if (outputGap > 0.5) {
                html += `• L'écart de production est positif (+${outputGap.toFixed(1).replace('.', ',')} %) : le PIB dépasse son potentiel. La règle prescrit de <span style="color: #d97706;">monter les taux</span> pour éviter les tensions inflationnistes.<br>`;
            } else {
                html += `• L'écart de production est quasi nul : l'économie tourne à son rythme potentiel.<br>`;
            }

            // Commentaire sur la décision de l'utilisateur
            html += `<br><strong>Votre choix :</strong><br>`;
            if (Math.abs(ecart) < 0.3) {
                html += `Votre taux (${userRate.toFixed(2).replace('.', ',')} %) correspond à ce que prescrit Taylor. Vous suivez la règle.`;
            } else if (ecart > 0) {
                html += `Votre taux est ${ecart.toFixed(1).replace('.', ',')} point${Math.abs(ecart) >= 1.5 ? 's' : ''} au-dessus de Taylor. C'est une posture <strong>restrictive</strong> : vous donnez la priorité à la lutte contre l'inflation, quitte à freiner davantage l'activité.`;
            } else {
                html += `Votre taux est ${Math.abs(ecart).toFixed(1).replace('.', ',')} point${Math.abs(ecart) >= 1.5 ? 's' : ''} en dessous de Taylor. C'est une posture <strong>accommodante</strong> : vous donnez la priorité au soutien de l'activité, quitte à tolérer plus d'inflation.`;
            }

            explanationDiv.innerHTML = html;
        }

        function setTaylorOptimal() {
            const inflation = parseFloat(document.getElementById('taylor_inflation').value);
            const outputGap = parseFloat(document.getElementById('taylor_output_gap').value);
            const targetInflation = parseFloat(document.getElementById('taylor_target_inflation').value);
            const rStar = parseFloat(document.getElementById('taylor_r_star').value);

            // Calculer le taux Taylor
            const taylorRate = rStar + inflation + 0.5 * (inflation - targetInflation) + 0.5 * outputGap;

            // Limiter aux bornes du curseur
            const taylorClamped = Math.max(0, Math.min(10, taylorRate));

            // Mettre à jour le curseur
            document.getElementById('taylor_user_rate').value = taylorClamped.toFixed(2);
            updateTaylorRuleGraph();
        }

        // ============================================================
        // SIMULATION : TAUX D'ACTUALISATION ET URGENCE CLIMATIQUE
        // ============================================================
        function updateDiscountRateGraph() {
            const damage = parseFloat(document.getElementById('climate_damage').value);
            const horizon = parseInt(document.getElementById('climate_horizon').value);
            const rate = parseFloat(document.getElementById('discount_rate').value);

            const horizonYear = 2025 + horizon;

            document.getElementById('climate_damage-value').textContent = damage.toFixed(1).replace('.', ',') + ' %';
            document.getElementById('climate_horizon-value').textContent = horizonYear + ' (n + ' + horizon + ' ans)';
            document.getElementById('discount_rate-value').textContent = rate.toFixed(1).replace('.', ',') + ' %';

            const presentValue = damage / Math.pow(1 + rate / 100, horizon);
            const fraction = presentValue / damage * 100;

            document.getElementById('result-present-value').textContent = presentValue.toFixed(2).replace('.', ',') + ' % du PIB';
            document.getElementById('result-discount-fraction').textContent = fraction.toFixed(1).replace('.', ',') + ' %';

            const refDiv = document.getElementById('result-economist-ref');
            const stanceDiv = document.getElementById('discount-stance');
            if (rate <= 1.5) {
                refDiv.textContent = '≈ Stern (2006)';
                stanceDiv.textContent = 'Action très urgente';
