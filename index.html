                stanceDiv.style.background = '#dcfce7';
                stanceDiv.style.color = '#16a34a';
            } else if (rate <= 3.5) {
                refDiv.textContent = '≈ Consensus GIEC';
                stanceDiv.textContent = 'Action urgente';
                stanceDiv.style.background = '#dbeafe';
                stanceDiv.style.color = '#2563eb';
            } else if (rate <= 6) {
                refDiv.textContent = '≈ Nordhaus (2016)';
                stanceDiv.textContent = 'Action modérée';
                stanceDiv.style.background = '#fef3c7';
                stanceDiv.style.color = '#d97706';
            } else {
                refDiv.textContent = '≈ Admin. Trump (~7 %)';
                stanceDiv.textContent = 'Faible urgence perçue';
                stanceDiv.style.background = '#fee2e2';
                stanceDiv.style.color = '#dc2626';
            }

            const canvas = document.getElementById('discountRateCanvas');
            const ctx = canvas.getContext('2d');
            const width = canvas.width;
            const height = canvas.height;
            const padding = { top: 50, right: 30, bottom: 60, left: 80 };
            const graphWidth = width - padding.left - padding.right;
            const graphHeight = height - padding.top - padding.bottom;

            ctx.clearRect(0, 0, width, height);

            const rMin = 0.5, rMax = 8;
            const points = [];
            for (let r = rMin; r <= rMax; r += 0.05) {
                points.push({ r, pv: damage / Math.pow(1 + r / 100, horizon) });
            }
            const yMax = damage * 1.1;
            const yMin = 0;

            const xScale = (r) => padding.left + ((r - rMin) / (rMax - rMin)) * graphWidth;
            const yScale = (v) => padding.top + graphHeight - ((v - yMin) / (yMax - yMin)) * graphHeight;

            // Grille
            ctx.strokeStyle = '#e0e0e0';
            ctx.lineWidth = 1;
            for (let i = 0; i <= 5; i++) {
                const y = padding.top + (i / 5) * graphHeight;
                ctx.beginPath(); ctx.moveTo(padding.left, y); ctx.lineTo(width - padding.right, y); ctx.stroke();
            }
            for (let r = 1; r <= 8; r++) {
                const x = xScale(r);
                ctx.beginPath(); ctx.moveTo(x, padding.top); ctx.lineTo(x, height - padding.bottom); ctx.stroke();
            }

            // Marqueurs économistes
            const economists = [
                { r: 1.4, label: 'Stern', color: '#16a34a' },
                { r: 5.0, label: 'Nordhaus', color: '#d97706' },
                { r: 7.0, label: 'Trump', color: '#dc2626' }
            ];
            economists.forEach(e => {
                ctx.strokeStyle = e.color; ctx.lineWidth = 1.5; ctx.setLineDash([5, 4]);
                ctx.beginPath(); ctx.moveTo(xScale(e.r), padding.top); ctx.lineTo(xScale(e.r), height - padding.bottom); ctx.stroke();
                ctx.setLineDash([]);
                ctx.fillStyle = e.color; ctx.font = 'bold 11px Segoe UI, sans-serif'; ctx.textAlign = 'center';
                ctx.fillText(e.label, xScale(e.r), padding.top - 12);
            });

            // Axes
            ctx.strokeStyle = '#333'; ctx.lineWidth = 2; ctx.setLineDash([]);
            ctx.beginPath(); ctx.moveTo(padding.left, padding.top); ctx.lineTo(padding.left, height - padding.bottom); ctx.lineTo(width - padding.right, height - padding.bottom); ctx.stroke();

            // Labels axe X
            ctx.fillStyle = '#666'; ctx.font = '12px Segoe UI, sans-serif'; ctx.textAlign = 'center';
            for (let r = 1; r <= 8; r++) { ctx.fillText(r + ' %', xScale(r), height - padding.bottom + 18); }
            ctx.fillText('Taux d\'actualisation', width / 2, height - 8);

            // Labels axe Y
            ctx.textAlign = 'right';
            for (let i = 0; i <= 5; i++) {
                const val = yMin + (i / 5) * (yMax - yMin);
                const y = padding.top + graphHeight - (i / 5) * graphHeight;
                ctx.fillText(val.toFixed(1).replace('.', ',') + ' %', padding.left - 8, y + 4);
            }
            ctx.save(); ctx.translate(16, height / 2); ctx.rotate(-Math.PI / 2); ctx.textAlign = 'center';
            ctx.fillText('Valeur présente (% PIB)', 0, 0); ctx.restore();

            // Remplissage dégradé sous la courbe
            const gradient = ctx.createLinearGradient(0, padding.top, 0, height - padding.bottom);
            gradient.addColorStop(0, 'rgba(34, 197, 94, 0.2)');
            gradient.addColorStop(1, 'rgba(34, 197, 94, 0.02)');
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.moveTo(xScale(points[0].r), yScale(points[0].pv));
            points.forEach(p => ctx.lineTo(xScale(p.r), yScale(p.pv)));
            ctx.lineTo(xScale(points[points.length - 1].r), height - padding.bottom);
            ctx.lineTo(padding.left, height - padding.bottom);
            ctx.closePath(); ctx.fill();

            // Ligne dommage brut
            ctx.strokeStyle = '#9ca3af'; ctx.lineWidth = 1; ctx.setLineDash([4, 4]);
            ctx.beginPath(); ctx.moveTo(padding.left, yScale(damage)); ctx.lineTo(width - padding.right, yScale(damage)); ctx.stroke();
            ctx.setLineDash([]);
            ctx.fillStyle = '#9ca3af'; ctx.font = '11px Segoe UI, sans-serif'; ctx.textAlign = 'left';
            ctx.fillText('Dommage brut = ' + damage.toFixed(1).replace('.', ',') + ' %', padding.left + 5, yScale(damage) - 5);

            // Courbe principale
            ctx.strokeStyle = '#16a34a'; ctx.lineWidth = 3;
            ctx.beginPath();
            points.forEach((p, i) => { if (i === 0) ctx.moveTo(xScale(p.r), yScale(p.pv)); else ctx.lineTo(xScale(p.r), yScale(p.pv)); });
            ctx.stroke();

            // Marqueur taux courant (vertical + horizontal)
            ctx.strokeStyle = '#cc785c'; ctx.lineWidth = 1.5; ctx.setLineDash([4, 3]);
            ctx.beginPath(); ctx.moveTo(xScale(rate), padding.top); ctx.lineTo(xScale(rate), height - padding.bottom); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(padding.left, yScale(presentValue)); ctx.lineTo(xScale(rate), yScale(presentValue)); ctx.stroke();
            ctx.setLineDash([]);

            // Point sur la courbe
            ctx.fillStyle = '#cc785c'; ctx.beginPath(); ctx.arc(xScale(rate), yScale(presentValue), 7, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = 'white'; ctx.beginPath(); ctx.arc(xScale(rate), yScale(presentValue), 3, 0, Math.PI * 2); ctx.fill();

            // Label valeur
            ctx.fillStyle = '#cc785c'; ctx.font = 'bold 11px Segoe UI, sans-serif';
            const lx = xScale(rate) + 10;
            const ly = yScale(presentValue) - 8;
            ctx.textAlign = lx > width - padding.right - 60 ? 'right' : 'left';
            ctx.fillText(presentValue.toFixed(1).replace('.', ',') + ' %', lx > width - padding.right - 60 ? xScale(rate) - 10 : lx, ly < padding.top + 15 ? yScale(presentValue) + 18 : ly);

            // Titre
            ctx.fillStyle = '#333'; ctx.font = 'bold 13px Segoe UI, sans-serif'; ctx.textAlign = 'center';
            ctx.fillText('Valeur présente d\'un dommage de ' + damage.toFixed(1).replace('.', ',') + ' % du PIB en ' + horizonYear, width / 2, padding.top - 25);
        }

        // ============================================================
        // SIMULATION : IDENTITÉ DE KAYA
        // ============================================================
        function updateKayaGraph() {
            const gGDP = parseFloat(document.getElementById('kaya_gdp').value);
            const gCarbon = parseFloat(document.getElementById('kaya_carbon').value);
            const gEnergy = parseFloat(document.getElementById('kaya_energy').value);

            document.getElementById('kaya_gdp-value').textContent = gGDP.toFixed(1).replace('.', ',') + ' %';
            document.getElementById('kaya_carbon-value').textContent = gCarbon.toFixed(1).replace('.', ',') + ' %';
            document.getElementById('kaya_energy-value').textContent = gEnergy.toFixed(1).replace('.', ',') + ' %';

            // Variation annuelle des émissions = croissance PIB - baisse intensité carbone - baisse intensité énergétique
            const annualChange = gGDP - gCarbon - gEnergy;
            const reductionRate = -annualChange;
            const gap = reductionRate - 5.0;

            const reductionStr = reductionRate >= 0
                ? '− ' + reductionRate.toFixed(1).replace('.', ',') + ' %/an'
                : '+ ' + Math.abs(reductionRate).toFixed(1).replace('.', ',') + ' %/an';
            document.getElementById('result-kaya-reduction').textContent = reductionStr;

            const gapStr = gap >= 0
                ? '+ ' + gap.toFixed(1).replace('.', ',') + ' pts'
                : '− ' + Math.abs(gap).toFixed(1).replace('.', ',') + ' pts';
            document.getElementById('result-kaya-gap').textContent = gapStr;

            // Émissions en 2055 (30 ans, base 100)
            const em2055 = 100 * Math.pow(1 + annualChange / 100, 30);
            document.getElementById('result-kaya-2055').textContent = em2055.toFixed(0);

            // Statut
            const statusDiv = document.getElementById('kaya-status');
            if (gap >= 0) {
                statusDiv.textContent = '✓ Objectif SNBC3 respecté';
                statusDiv.style.background = 'var(--success-bg)';
                statusDiv.style.color = 'var(--success)';
            } else if (gap >= -1.5) {
                statusDiv.textContent = '⚠️ Effort insuffisant';
                statusDiv.style.background = '#fef3c7';
                statusDiv.style.color = '#d97706';
            } else {
                statusDiv.textContent = '✗ Trajectoire incompatible';
                statusDiv.style.background = 'var(--error-bg)';
                statusDiv.style.color = 'var(--error)';
            }

            const canvas = document.getElementById('kayaCanvas');
            const ctx = canvas.getContext('2d');
            const width = canvas.width;
            const height = canvas.height;
            const padding = { top: 40, right: 30, bottom: 60, left: 70 };
            const graphWidth = width - padding.left - padding.right;
            const graphHeight = height - padding.top - padding.bottom;

            ctx.clearRect(0, 0, width, height);

            const years = 31;
            const emissions = [];
            const target = [];
            for (let i = 0; i < years; i++) {
                emissions.push(100 * Math.pow(1 + annualChange / 100, i));
                target.push(100 * Math.pow(1 - 5.0 / 100, i));
            }

            const allValues = [...emissions, ...target];
            const yMin = Math.max(0, Math.min(...allValues) * 0.9);
            const yMax = Math.max(115, ...allValues) * 1.05;

            const xScale = (i) => padding.left + (i / (years - 1)) * graphWidth;
            const yScale = (v) => padding.top + graphHeight - ((v - yMin) / (yMax - yMin)) * graphHeight;

            // Grille
            ctx.strokeStyle = '#e0e0e0'; ctx.lineWidth = 1;
            for (let i = 0; i <= 5; i++) {
                const y = padding.top + (i / 5) * graphHeight;
                ctx.beginPath(); ctx.moveTo(padding.left, y); ctx.lineTo(width - padding.right, y); ctx.stroke();
            }
            for (let i = 0; i < years; i += 5) {
                const x = xScale(i);
                ctx.beginPath(); ctx.moveTo(x, padding.top); ctx.lineTo(x, height - padding.bottom); ctx.stroke();
            }

            // Ligne de base 100
            if (100 >= yMin && 100 <= yMax) {
                ctx.strokeStyle = '#9ca3af'; ctx.lineWidth = 1; ctx.setLineDash([3, 3]);
                ctx.beginPath(); ctx.moveTo(padding.left, yScale(100)); ctx.lineTo(width - padding.right, yScale(100)); ctx.stroke();
                ctx.setLineDash([]);
            }

            // Axes
            ctx.strokeStyle = '#333'; ctx.lineWidth = 2; ctx.setLineDash([]);
            ctx.beginPath(); ctx.moveTo(padding.left, padding.top); ctx.lineTo(padding.left, height - padding.bottom); ctx.lineTo(width - padding.right, height - padding.bottom); ctx.stroke();

            // Labels axe X
            const baseYear = 2025;
            ctx.fillStyle = '#666'; ctx.font = '12px Segoe UI, sans-serif'; ctx.textAlign = 'center';
            for (let i = 0; i < years; i += 5) { ctx.fillText(baseYear + i, xScale(i), height - padding.bottom + 18); }
            ctx.fillText('Année', width / 2, height - 8);

            // Labels axe Y
            ctx.textAlign = 'right';
            for (let i = 0; i <= 5; i++) {
                const val = yMin + (i / 5) * (yMax - yMin);
                const y = padding.top + graphHeight - (i / 5) * graphHeight;
                ctx.fillText(val.toFixed(0), padding.left - 8, y + 4);
            }
            ctx.save(); ctx.translate(16, height / 2); ctx.rotate(-Math.PI / 2); ctx.textAlign = 'center';
            ctx.fillText('Émissions (base 100 en 2025)', 0, 0); ctx.restore();

            // Zone colorée entre les deux courbes
            ctx.fillStyle = gap >= 0 ? 'rgba(34, 197, 94, 0.1)' : 'rgba(239, 68, 68, 0.1)';
            ctx.beginPath();
            ctx.moveTo(xScale(0), yScale(emissions[0]));
            for (let i = 1; i < years; i++) ctx.lineTo(xScale(i), yScale(emissions[i]));
            for (let i = years - 1; i >= 0; i--) ctx.lineTo(xScale(i), yScale(target[i]));
            ctx.closePath(); ctx.fill();

            // Courbe cible (vert pointillé)
            ctx.strokeStyle = '#16a34a'; ctx.lineWidth = 2.5; ctx.setLineDash([8, 4]);
            ctx.beginPath();
            for (let i = 0; i < years; i++) { if (i === 0) ctx.moveTo(xScale(i), yScale(target[i])); else ctx.lineTo(xScale(i), yScale(target[i])); }
            ctx.stroke();

            // Courbe trajectoire utilisateur
            const trajColor = annualChange <= 0 ? '#2563eb' : '#dc2626';
            ctx.strokeStyle = trajColor; ctx.lineWidth = 3; ctx.setLineDash([]);
            ctx.beginPath();
            for (let i = 0; i < years; i++) { if (i === 0) ctx.moveTo(xScale(i), yScale(emissions[i])); else ctx.lineTo(xScale(i), yScale(emissions[i])); }
            ctx.stroke();

            // Légende
            ctx.font = '12px Segoe UI, sans-serif';
            const legendX = width - padding.right - 210;
            const legendY = padding.top + 10;

            ctx.strokeStyle = trajColor; ctx.lineWidth = 3; ctx.setLineDash([]);
            ctx.beginPath(); ctx.moveTo(legendX, legendY); ctx.lineTo(legendX + 25, legendY); ctx.stroke();
            ctx.fillStyle = '#333'; ctx.textAlign = 'left';
            ctx.fillText('Votre trajectoire', legendX + 35, legendY + 4);

            ctx.strokeStyle = '#16a34a'; ctx.lineWidth = 2; ctx.setLineDash([6, 3]);
            ctx.beginPath(); ctx.moveTo(legendX, legendY + 20); ctx.lineTo(legendX + 25, legendY + 20); ctx.stroke();
            ctx.setLineDash([]);
            ctx.fillStyle = '#333';
            ctx.fillText('Cible SNBC3 (− 5 %/an)', legendX + 35, legendY + 24);

            // Titre
            ctx.fillStyle = '#333'; ctx.font = 'bold 13px Segoe UI, sans-serif'; ctx.textAlign = 'center';
            ctx.fillText('Trajectoire des émissions de CO₂ (2025–2055)', width / 2, padding.top - 20);
        }

        function updateEmploymentAgeGraph() {
            const youth = parseFloat(document.getElementById('empl_youth').value);
            const adult = parseFloat(document.getElementById('empl_adult').value);
            const senior = parseFloat(document.getElementById('empl_senior').value);

            document.getElementById('empl_youth-value').textContent = youth + ' %';
            document.getElementById('empl_adult-value').textContent = adult + ' %';
            document.getElementById('empl_senior-value').textContent = senior + ' %';

            // Poids réels dans la pop. 15-64 française (Eurostat demo_pjan, 2024)
            const wYouth = 0.195, wAdult = 0.599, wSenior = 0.206;

            // France (scénario utilisateur)
            const franceTaux = youth * wYouth + adult * wAdult + senior * wSenior;

            // Allemagne : taux global fixe Eurostat 2024 (poids allemands différents)
            const deYouth = 51, deAdult = 85, deSenior = 75;
            const deTaux = 77.5;

            const gap = franceTaux - deTaux;

            document.getElementById('result-empl-france').textContent = formatNumber(franceTaux, 1) + ' %';
            document.getElementById('result-empl-germany').textContent = '77,5 %';
            const initialGap = 8.6;
            const comble = Math.max(0, Math.round((1 - Math.abs(gap) / initialGap) * 100));
            document.getElementById('result-empl-gap').textContent = (gap >= 0 ? '+ ' : '− ') + formatNumber(Math.abs(gap), 1) + ' pts';
            document.getElementById('result-empl-gap').style.color = gap >= 0 ? '#16a34a' : '#dc2626';
            document.getElementById('result-empl-comble').textContent = '(' + comble + ' % de l\'écart comblé)';

            // Dessin du graphique en barres groupées
            const canvas = document.getElementById('employmentAgeCanvas');
            const ctx = canvas.getContext('2d');
            const width = canvas.width;
            const height = canvas.height;
            ctx.clearRect(0, 0, width, height);

            const padding = { top: 50, right: 30, bottom: 60, left: 50 };
            const chartW = width - padding.left - padding.right;
            const chartH = height - padding.top - padding.bottom;

            const categories = [
                { label: '15-24 ans', fr: youth, de: deYouth },
                { label: '25-54 ans', fr: adult, de: deAdult },
                { label: '55-64 ans', fr: senior, de: deSenior },
                { label: 'Global', fr: franceTaux, de: deTaux }
            ];

            const groupWidth = chartW / categories.length;
            const barWidth = groupWidth * 0.3;
            const barGap = 6;

            // Grille
            ctx.strokeStyle = '#e5e7eb'; ctx.lineWidth = 1;
            for (let v = 0; v <= 100; v += 20) {
                const y = padding.top + chartH - (v / 100) * chartH;
                ctx.beginPath(); ctx.moveTo(padding.left, y); ctx.lineTo(width - padding.right, y); ctx.stroke();
                ctx.fillStyle = '#888'; ctx.font = '11px Segoe UI, sans-serif'; ctx.textAlign = 'right';
                ctx.fillText(v + ' %', padding.left - 8, y + 4);
            }

            const frColor = '#3b82f6';
            const deColor = '#f59e0b';

            categories.forEach((cat, i) => {
                const cx = padding.left + groupWidth * i + groupWidth / 2;

                // Barre France
                const frH = (cat.fr / 100) * chartH;
                const frX = cx - barWidth - barGap / 2;
                const frY = padding.top + chartH - frH;
                ctx.fillStyle = frColor;
                ctx.fillRect(frX, frY, barWidth, frH);

                // Valeur France
                ctx.fillStyle = '#333'; ctx.font = 'bold 11px Segoe UI, sans-serif'; ctx.textAlign = 'center';
                ctx.fillText(Math.round(cat.fr) + ' %', frX + barWidth / 2, frY - 6);

                // Barre Allemagne
                const deH = (cat.de / 100) * chartH;
                const deX = cx + barGap / 2;
                const deY = padding.top + chartH - deH;
                ctx.fillStyle = deColor;
                ctx.fillRect(deX, deY, barWidth, deH);

                // Valeur Allemagne
                ctx.fillStyle = '#333'; ctx.font = 'bold 11px Segoe UI, sans-serif'; ctx.textAlign = 'center';
                ctx.fillText(Math.round(cat.de) + ' %', deX + barWidth / 2, deY - 6);

                // Écart
                const ecart = cat.fr - cat.de;
                if (i < 3) {
                    const ecartY = Math.min(frY, deY) - 22;
                    ctx.fillStyle = ecart >= 0 ? '#16a34a' : '#dc2626';
                    ctx.font = 'bold 10px Segoe UI, sans-serif';
                    ctx.fillText((ecart >= 0 ? '+' : '') + Math.round(ecart) + ' pts', cx, ecartY);
                }

                // Label catégorie
                ctx.fillStyle = '#333'; ctx.font = (i === 3 ? 'bold ' : '') + '12px Segoe UI, sans-serif'; ctx.textAlign = 'center';
                ctx.fillText(cat.label, cx, padding.top + chartH + 20);
            });

            // Séparateur avant "Global"
            const sepX = padding.left + groupWidth * 3;
            ctx.strokeStyle = '#ccc'; ctx.lineWidth = 1; ctx.setLineDash([4, 4]);
            ctx.beginPath(); ctx.moveTo(sepX, padding.top); ctx.lineTo(sepX, padding.top + chartH); ctx.stroke();
            ctx.setLineDash([]);

            // Légende
            ctx.font = '12px Segoe UI, sans-serif';
            const lx = width - padding.right - 220;
            const ly = padding.top + 5;

            ctx.fillStyle = frColor; ctx.fillRect(lx, ly - 5, 16, 12);
            ctx.fillStyle = '#333'; ctx.textAlign = 'left'; ctx.fillText('France (votre scénario)', lx + 22, ly + 5);

            ctx.fillStyle = deColor; ctx.fillRect(lx, ly + 15, 16, 12);
            ctx.fillStyle = '#333'; ctx.fillText('Allemagne', lx + 22, ly + 25);

            // Titre
            ctx.fillStyle = '#333'; ctx.font = 'bold 13px Segoe UI, sans-serif'; ctx.textAlign = 'center';
            ctx.fillText('Taux d\'emploi par tranche d\'âge : France vs Allemagne', width / 2, padding.top - 20);
        }

        // --- Matching game: 190 Md€ politiques de l'emploi ---
        const matchingPolicies = [
            { id: 'allegements', label: 'Allègements de cotisations sociales', cost: 95 },
            { id: 'chomage', label: 'Allocations chômage et activité partielle', cost: 47 },
            { id: 'formation', label: 'Formation professionnelle', cost: 30 },
            { id: 'incitations', label: 'Incitations à l\'activité (prime d\'activité...)', cost: 12 },
            { id: 'accompagnement', label: 'Accompagnement (ex : France Travail)', cost: 7 }
        ];
        let matchingValidated = false;

        function initMatchingGame() {
            matchingValidated = false;
            const costs = [95, 47, 30, 12, 7];
            const shuffled = costs.slice().sort(() => Math.random() - 0.5);
            const optionsHtml = '<option value="">Choisir...</option>' + shuffled.map(c => `<option value="${c}">${c} Md€</option>`).join('');

            const gameDiv = document.getElementById('matching-game');
            const shuffledPolicies = matchingPolicies.slice().sort(() => Math.random() - 0.5);
            gameDiv.innerHTML = shuffledPolicies.map(p => `
                <div id="row-${p.id}" style="display:flex;align-items:center;gap:12px;padding:12px 16px;
                     border:2px solid #e5e7eb;border-radius:10px;margin-bottom:10px;background:#fff;
                     flex-wrap:wrap;">
                    <span style="flex:1;min-width:200px;font-weight:500;font-size:0.9em;">${p.label}</span>
                    <select id="select-${p.id}" style="padding:8px 12px;
                        border:2px solid var(--primary);border-radius:8px;font-size:0.95em;font-weight:600;
                        color:var(--primary-dark);background:#f0f4ff;cursor:pointer;min-width:120px;">
                        ${optionsHtml}
                    </select>
                </div>
            `).join('');

            document.getElementById('matching-validate-btn').classList.add('show');
            document.getElementById('matching-reset-btn').classList.remove('show');
            document.getElementById('matching-feedback').innerHTML = '';
            document.getElementById('matching-explanation').style.display = 'none';
        }

        function validateMatching() {
            // Vérifier que tous les menus sont remplis
            const allFilled = matchingPolicies.every(p => document.getElementById('select-' + p.id).value !== '');
            if (!allFilled) {
                document.getElementById('matching-feedback').innerHTML = '<div style="padding:12px;background:#fff3cd;border-radius:8px;color:#856404;font-weight:600;">Associez un montant à chaque politique avant de valider.</div>';
                return;
            }

            matchingValidated = true;
            let correct = 0;

            matchingPolicies.forEach(p => {
                const sel = document.getElementById('select-' + p.id);
                const row = document.getElementById('row-' + p.id);
                const chosen = parseInt(sel.value);
                sel.disabled = true;

                if (chosen === p.cost) {
                    row.style.borderColor = '#16a34a';
                    row.style.background = '#f0fdf4';
                    sel.style.borderColor = '#16a34a';
                    sel.style.color = '#16a34a';
                    correct++;
                } else {
                    row.style.borderColor = '#dc2626';
                    row.style.background = '#fef2f2';
                    sel.style.borderColor = '#dc2626';
                    sel.style.color = '#dc2626';
                    const correction = document.createElement('span');
                    correction.style.cssText = 'font-weight:700;color:#16a34a;font-size:0.95em;margin-left:8px;';
                    correction.textContent = '→ ' + p.cost + ' Md€';
                    sel.parentNode.appendChild(correction);
                }
            });

            const feedbackEl = document.getElementById('matching-feedback');
            if (correct === 5) {
                feedbackEl.innerHTML = '<div style="padding:12px;background:#f0fdf4;border-radius:8px;color:#16a34a;font-weight:600;">Parfait ! 5/5 — Vous maîtrisez la répartition des 190 Md€.</div>';
            } else {
                feedbackEl.innerHTML = `<div style="padding:12px;background:#fef2f2;border-radius:8px;color:#dc2626;font-weight:600;">${correct}/5 — Les bonnes réponses sont affichées en vert.</div>`;
            }

            document.getElementById('matching-validate-btn').classList.remove('show');
            document.getElementById('matching-reset-btn').classList.add('show');
            document.getElementById('matching-explanation').style.display = '';
        }

        function resetMatching() {
            initMatchingGame();
        }

        function simNavButton() {
            if (currentIndex < currentQuestions.length - 1) {
                return `<div style="display:flex;gap:10px;margin-top:10px;flex-wrap:wrap;">
                    <button class="btn-next show" onclick="nextSimulation()" style="flex:1;min-width:150px;">Simulation suivante →</button>
                    <button class="btn-next show" onclick="backToMenu()" style="flex:1;min-width:150px;background:var(--bg-card);color:var(--primary-dark);border:2px solid var(--primary);">Retour au menu</button>
                </div>`;
            }
            return `<button class="btn-next show" onclick="backToMenu()" style="background:var(--bg-card);color:var(--primary-dark);border:2px solid var(--primary);">Retour au menu</button>`;
        }

        function nextSimulation() {
            currentIndex++;
            updateProgress();
            renderQuestion();
        }

        function nextQuestion() {
            currentIndex++;
            usingAltVersion = false;
            updateProgress();
            renderQuestion();
        }

        function updateProgress() {
            document.getElementById('current-q').textContent = Math.min(currentIndex + 1, currentQuestions.length);
            document.getElementById('total-q').textContent = currentQuestions.length;

            const progress = currentQuestions.length > 0 ? (currentIndex / currentQuestions.length) * 100 : 0;
            document.getElementById('progress-fill').style.width = `${progress}%`;
        }

        function showResults() {
            const container = document.getElementById('question-container');
            const percentage = Math.round((score / currentQuestions.length) * 100);

            container.innerHTML = `
                <div class="results-card">
                    <h2>Résultats</h2>
                    <div class="results-score">${score}/${currentQuestions.length}</div>
                    <p class="results-details">${percentage}% de bonnes réponses</p>
                    <button class="btn-restart" onclick="backToMenu()">Retour au menu</button>
                </div>
            `;
        }

        function backToMenu() {
            document.getElementById('quiz').style.display = 'none';
            document.getElementById('menu').style.display = 'block';
            currentQuestions = [];
            currentIndex = 0;
            score = 0;
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        // Formater un nombre selon les conventions françaises
        // - Virgule comme séparateur décimal
        // - Espace insécable comme séparateur de milliers
        // - Espace après le signe moins
        function formatNumber(num, decimals = null) {
            const isNegative = num < 0;
            const absNum = Math.abs(num);

            // Formater avec les décimales
            let formatted;
            if (decimals !== null) {
                formatted = absNum.toFixed(decimals);
            } else {
                // Garder les décimales existantes
                formatted = absNum.toString();
            }

            // Séparer partie entière et décimale
            const parts = formatted.split('.');
            let intPart = parts[0];
            const decPart = parts[1];

            // Ajouter les séparateurs de milliers (espace insécable)
            intPart = intPart.replace(/\B(?=(\d{3})+(?!\d))/g, ' ');

            // Reconstruire avec virgule comme séparateur décimal
            if (decPart) {
                formatted = intPart + ',' + decPart;
            } else {
                formatted = intPart;
            }

            // Ajouter le signe moins avec espace
            if (isNegative) {
                formatted = '- ' + formatted;
            }

            return formatted;
        }

        // Démarrage
        init();
    </script>
